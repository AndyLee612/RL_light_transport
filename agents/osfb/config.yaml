# training/eval
batch_size: 1024                # was 512, JAX one-step FB uses 1024
max_buffer_episodes: 5000
z_inference_steps: 10000
discount: 0.99                  # was 0.98, JAX one-step FB uses 0.99
eval_frequency: 20000
eval_rollouts: 10

# forward-backward
name: "one_step_fb"
preprocessor_hidden_dimension: 1024
preprocessor_hidden_layers: 2
preprocessor_output_dimension: 512
preprocessor_activation: "relu"

z_dimension: 128                # was 50, JAX one-step FB uses 128

forward_hidden_dimension: 512   # was 1024, JAX uses 512 but 4 layers
forward_hidden_layers: 4        # was 2, JAX uses 4
forward_number_of_features: 2
forward_activation: "gelu"      # was relu, JAX uses gelu

backward_hidden_dimension: 512  # was 256, JAX uses 512 but 4 layers
backward_hidden_layers: 4       # was 3, JAX uses 4
backward_activation: "gelu"     # was relu, JAX uses gelu

actor_hidden_dimension: 512     # was 1024, JAX uses 512 but 4 layers
actor_hidden_layers: 4          # was 2, JAX uses 4
actor_activation: "gelu"        # was relu, JAX uses gelu

seed: 42
critic_learning_rate: 0.001  # was 0.0001
actor_learning_rate: 0.001
learning_steps: 1000000
learning_rate_coefficient: 1
orthonormalisation_coefficient: 0.01   # was 1, JAX one-step FB uses 0.0
z_mix_ratio: 0.5
gaussian_actor: false
std_dev_clip: 0.3
std_dev_schedule: "0.2"
std_dev_eval: 0.05
tau: 0.005                      # was 0.01, JAX one-step FB uses 0.005

# --- one-step FB specific (new) ---
repr_agg: "mean"                # aggregation for target successor measures: "mean" or "min"
q_agg: "min"                    # aggregation for Q values: "mean" or "min"
alpha: 1.0                      # BC regularisation weight in RPG+BC actor loss
normalize_q_loss: true          # scale Q loss by 1/|Q|.mean() for scale invariance
const_std: true                 # use deterministic (mode) actions for Q evaluation
reward_temperature: 10.0        # softmax temperature for reward-weighted z inference